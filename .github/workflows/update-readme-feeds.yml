name: Update README Feeds

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Fetch latest blog and news posts
        id: feeds
        env:
          BLOG_FEED_URL: https://bhart.org/rss.xml
          NEWS_FEED_URL: https://bhart.org/news-rss.xml
          MAX_POST_COUNT: "5"
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.request
          import xml.etree.ElementTree as ET
          from email.utils import parsedate_to_datetime


          ATOM_NS = "{http://www.w3.org/2005/Atom}"


          def parse_date(raw):
              if not raw:
                  return ""
              try:
                  return parsedate_to_datetime(raw).astimezone().isoformat()
              except (TypeError, ValueError, IndexError):
                  return raw


          def text_or_empty(element, path):
              child = element.find(path)
              if child is None or child.text is None:
                  return ""
              return child.text.strip()


          def entry_link(entry):
              link = text_or_empty(entry, "link")
              if link:
                  return link

              atom_link = entry.find(f"{ATOM_NS}link")
              if atom_link is None:
                  return ""
              return (atom_link.get("href") or "").strip()


          def parse_feed(url, max_items):
              request = urllib.request.Request(url, headers={"User-Agent": "brucehart-readme-feed-updater/1.0"})
              with urllib.request.urlopen(request, timeout=30) as response:
                  payload = response.read()

              root = ET.fromstring(payload)
              channel = root.find("channel")
              items = []

              if channel is not None:
                  entries = channel.findall("item")
                  for entry in entries:
                      items.append(
                          {
                              "title": text_or_empty(entry, "title"),
                              "url": entry_link(entry),
                              "date": parse_date(
                                  text_or_empty(entry, "pubDate")
                                  or text_or_empty(entry, "published")
                                  or text_or_empty(entry, "updated")
                              ),
                          }
                      )
              else:
                  entries = root.findall(f"{ATOM_NS}entry")
                  for entry in entries:
                      items.append(
                          {
                              "title": text_or_empty(entry, f"{ATOM_NS}title"),
                              "url": entry_link(entry),
                              "date": parse_date(
                                  text_or_empty(entry, f"{ATOM_NS}published")
                                  or text_or_empty(entry, f"{ATOM_NS}updated")
                              ),
                          }
                      )

              items = [item for item in items if item["title"] and item["url"]]
              items.sort(key=lambda item: item["date"], reverse=True)
              return items[:max_items]


          blog_posts = parse_feed(os.environ["BLOG_FEED_URL"], int(os.environ["MAX_POST_COUNT"]))
          news_posts = parse_feed(os.environ["NEWS_FEED_URL"], int(os.environ["MAX_POST_COUNT"]))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              for name, value in (
                  ("blog_results", blog_posts),
                  ("news_results", news_posts),
              ):
                  output.write(f"{name}<<__CODEx_EOF__\n")
                  output.write(json.dumps(value))
                  output.write("\n__CODEx_EOF__\n")
          PY

      - name: Render feed sections into README
        env:
          BLOG_RESULTS: ${{ steps.feeds.outputs.blog_results }}
          NEWS_RESULTS: ${{ steps.feeds.outputs.news_results }}
        run: |
          node <<'NODE'
          const fs = require('node:fs');

          const readmePath = 'README.md';
          const readme = fs.readFileSync(readmePath, 'utf8');

          const blogPosts = JSON.parse(process.env.BLOG_RESULTS || '[]');
          const newsPosts = JSON.parse(process.env.NEWS_RESULTS || '[]');

          const toSmallDate = (post) => {
            const raw =
              post.date || post.pubDate || post.isoDate || post.published || post.publishedAt;
            if (!raw) return '';

            const parsed = new Date(raw);
            if (Number.isNaN(parsed.getTime())) return ` <sub>(${raw})</sub>`;

            const formatted = parsed.toLocaleDateString('en-US', {
              month: 'short',
              day: 'numeric',
              year: 'numeric',
              timeZone: 'UTC',
            });
            return ` <sub>(${formatted})</sub>`;
          };

          const toList = (posts) =>
            posts.map((p) => `- [${p.title}](${p.url})${toSmallDate(p)}`).join('\n');

          const replaceSection = (content, tag, list) => {
            const start = `<!-- ${tag}:START -->`;
            const end = `<!-- ${tag}:END -->`;
            const pattern = new RegExp(`${start}[\\s\\S]*?${end}`, 'm');
            return content.replace(pattern, `${start}\n${list}\n${end}`);
          };

          let updated = readme;
          updated = replaceSection(updated, 'BLOG-POST-LIST', toList(blogPosts));
          updated = replaceSection(updated, 'NEWS-LIST', toList(newsPosts));

          fs.writeFileSync(readmePath, updated);
          NODE

      - name: Commit and push README updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No README changes to commit" && exit 0
          git commit -m "chore: refresh README feeds"
          git push origin HEAD:main
